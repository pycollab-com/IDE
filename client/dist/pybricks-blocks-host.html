<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pybricks Blocks Host</title>
    <link rel="stylesheet" href="/vendor/pybricks-beta/static/css/498.68057313.chunk.css" />
    <link rel="stylesheet" href="/vendor/pybricks-beta/static/css/5261.3782e38d.chunk.css" />
    <link rel="stylesheet" href="/vendor/pybricks-beta/static/css/8148.fd222d4b.chunk.css" />
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #edf1f7;
      }

      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #app {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      #workspace {
        position: absolute;
        inset: 0;
      }

      #status {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 40;
        display: none;
        max-width: min(640px, calc(100vw - 24px));
        padding: 8px 10px;
        border-radius: 10px;
        background: rgba(15, 23, 42, 0.9);
        color: rgba(255, 255, 255, 0.94);
        font-size: 12px;
        white-space: pre-wrap;
      }

      #status.visible {
        display: block;
      }

      #presence-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 30;
      }

      .pycollab-remote-pointer {
        position: absolute;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transform: translate(-50%, -50%);
      }

      .pycollab-remote-pointer::before {
        content: "";
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: var(--pointer-color, #2563eb);
        border: 2px solid rgba(255, 255, 255, 0.94);
        box-shadow: 0 8px 20px rgba(15, 23, 42, 0.22);
      }

      .pycollab-remote-pointer-label {
        display: inline-flex;
        align-items: center;
        padding: 4px 10px;
        border-radius: 999px;
        background: var(--pointer-color, #2563eb);
        color: #fff;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.01em;
        white-space: nowrap;
        box-shadow: 0 8px 20px rgba(15, 23, 42, 0.22);
      }

      .pycollab-remote-selection {
        position: absolute;
        border: 2px solid var(--selection-color, #2563eb);
        border-radius: 12px;
        background: color-mix(in srgb, var(--selection-color, #2563eb) 12%, transparent);
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.85) inset;
      }

      .pycollab-remote-selection.dragging {
        border-style: dashed;
      }

      .pycollab-remote-selection-tag {
        position: absolute;
        top: -24px;
        left: 0;
        display: inline-flex;
        align-items: center;
        padding: 3px 8px;
        border-radius: 999px;
        background: var(--selection-color, #2563eb);
        color: #fff;
        font-size: 10px;
        font-weight: 700;
        white-space: nowrap;
      }

      .pycollab-remote-editing-stack {
        position: absolute;
        left: 12px;
        bottom: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .pycollab-remote-editing-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        max-width: min(420px, calc(100vw - 24px));
        padding: 8px 10px;
        border-radius: 12px;
        background: rgba(15, 23, 42, 0.88);
        color: rgba(255, 255, 255, 0.94);
        box-shadow: 0 12px 28px rgba(15, 23, 42, 0.24);
        font-size: 12px;
      }

      .pycollab-remote-editing-swatch {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--editing-color, #2563eb);
        flex: none;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="workspace"></div>
      <div id="status"></div>
      <div id="presence-layer"></div>
    </div>
    <script type="module" src="/pybricks-blocks-host.js"></script>
  </body>
  </html>
